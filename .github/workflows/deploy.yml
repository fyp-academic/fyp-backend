name: Deploy FYP Backend to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy to temp directory via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/tmp/fyp-backend-deploy"
          overwrite: true

      - name: Sync to live and run post-deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Sync code from temp to live, excluding server-managed dirs
            rsync -a --delete \
              --exclude=storage \
              --exclude=bootstrap/cache \
              --exclude=.env \
              --exclude=database/*.sqlite \
              --exclude=.git \
              /tmp/fyp-backend-deploy/ /var/www/fyp-backend/

            cd /var/www/fyp-backend
            php artisan migrate --force
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            rm -f storage/logs/laravel.log
            php artisan config:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            rm -rf /tmp/fyp-backend-deploy
            echo "Deployment finished at $(date)"
