; PHP-FPM per-directory overrides for the API public root.
; Allows large H5P (.h5p) and SCORM (.zip) package uploads.
; Takes effect on php-fpm reload, or within user_ini.cache_ttl (default 300s).
upload_max_filesize = 512M
post_max_size = 512M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
